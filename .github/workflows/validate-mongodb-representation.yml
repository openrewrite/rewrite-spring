---
# Temporary workflow file; removed after generated metadata is committed.
name: generate MongoDB representation recipe metadata

on:
  push:
    branches:
      - detect-mongodb-value-representations

permissions:
  contents: write

jobs:
  recipe-metadata:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: detect-mongodb-value-representations
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v5
      - name: Generate recipe metadata
        run: ./gradlew --console=plain --stacktrace --no-daemon recipeCsvGenerate
      - name: Commit generated recipe metadata
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/main/resources/META-INF/rewrite/recipes.csv
          if ! git diff --cached --quiet; then
            git commit -m "Update generated recipe metadata"
            git push origin HEAD:detect-mongodb-value-representations
          fi
