---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.spring.AddParametersCompilerFlag
displayName: Add `-parameters` compiler flag for Spring
description: >-
  Adds the `-parameters` compiler flag to Maven and Gradle build files.
  Spring uses parameter name retention (enabled by this flag) for dependency injection
  name resolution. Projects that already retain parameter names — through their own
  configuration, `spring-boot-starter-parent`, or the Spring Boot Gradle plugin — are not modified.
tags:
  - spring
  - maven
  - gradle
preconditions:
  - org.openrewrite.java.dependencies.search.ModuleHasDependency:
      groupIdPattern: org.springframework*
      artifactIdPattern: "*"
recipeList:
  - org.openrewrite.java.spring.AddParametersCompilerFlagToMaven
  - org.openrewrite.gradle.spring.AddParametersCompilerFlagToGradle
