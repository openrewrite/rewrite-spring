---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.spring.data.UpgradeSpringData_4_0
displayName: Migrate to Spring Data 4.0
description: >-
  Migrate applications to the Spring Data 2025.1 release train.
  Datastore-specific migration support is added incrementally.
preconditions:
  - org.openrewrite.Singleton
recipeList:
  - org.openrewrite.java.spring.data.UpgradeSpringData_3_4
  - org.openrewrite.java.spring.data.MigrateSpringDataMongoDb5

---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.spring.data.MigrateSpringDataMongoDb5
displayName: Migrate to Spring Data MongoDB 5.0
description: >-
  Align explicitly versioned Spring Data MongoDB and supported MongoDB JVM driver
  dependencies with Spring Data MongoDB 5.0. Managed, versionless dependencies remain managed.
preconditions:
  - org.openrewrite.java.dependencies.search.ModuleHasDependency:
      groupIdPattern: org.springframework.data
      artifactIdPattern: spring-data-mongodb
  - org.openrewrite.Singleton
recipeList:
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: org.springframework.data
      artifactId: spring-data-mongodb
      newVersion: 5.0.x
      overrideManagedVersion: false

  # Spring Data MongoDB 5.x requires MongoDB Java Driver 5.6 or later.
  # Upgrade an explicitly imported MongoDB dependency platform before its components.
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: org.mongodb
      artifactId: mongodb-driver-bom
      newVersion: 5.6.x
      overrideManagedVersion: false

  # Driver modules used directly or optionally by Spring Data MongoDB.
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: org.mongodb
      artifactId: mongodb-driver-core
      newVersion: 5.6.x
      overrideManagedVersion: false
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: org.mongodb
      artifactId: mongodb-driver-sync
      newVersion: 5.6.x
      overrideManagedVersion: false
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: org.mongodb
      artifactId: mongodb-driver-reactivestreams
      newVersion: 5.6.x
      overrideManagedVersion: false
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: org.mongodb
      artifactId: mongodb-crypt
      newVersion: 5.6.x
      overrideManagedVersion: false

  # Java driver component libraries that applications may explicitly pin.
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: org.mongodb
      artifactId: bson
      newVersion: 5.6.x
      overrideManagedVersion: false
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: org.mongodb
      artifactId: bson-record-codec
      newVersion: 5.6.x
      overrideManagedVersion: false

  # Keep legacy API users on a compatible driver generation. Replacing the legacy
  # artifact and APIs with the sync driver belongs in a separate source migration.
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: org.mongodb
      artifactId: mongodb-driver-legacy
      newVersion: 5.6.x
      overrideManagedVersion: false
